<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codex Remote Hub</title>
    <link rel="stylesheet" href="./thread-chat.css?v=20260427b">
</head>
<body>
    <div id="login-overlay" class="overlay">
        <div class="login-card">
            <h2>Codex Remote Hub</h2>
            <p>请输入访问令牌以继续</p>
            <input type="password" id="login-password" placeholder="Password">
            <button id="login-btn" class="primary-btn">登录</button>
        </div>
    </div>

    <div id="app-container" class="app-container hidden">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="brand">Codex Hub</div>
                <button id="logout-btn" class="icon-btn" title="退出">✕</button>
            </div>
            <div id="thread-list" class="thread-list">
                </div>
        </aside>

        <main class="main-content">
            <header class="autopilot-header">
                <div class="autopilot-summary">
                    <div class="status-group">
                        <span class="mobile-menu-btn" id="mobile-menu-btn">☰</span>
                        <span id="ap-status-dot" class="status-dot"></span>
                        <span class="ap-title">托管：<b id="ap-mode-name">未开启</b></span>
                    </div>
                    <div class="action-group">
                        <button id="toggle-ap-btn" class="secondary-btn">开启托管</button>
                        <button id="tick-now-btn" class="secondary-btn">立即执行</button>
                        <button id="expand-ap-btn" class="icon-btn">⚙</button>
                    </div>
                </div>

                <div id="ap-advanced" class="ap-advanced hidden">
                    <div class="setting-grid">
                        <div class="field">
                            <label>托管模式</label>
                            <select id="ap-preset-select">
                                <option value="night-default">夜间继续</option>
                                <option value="progress-check">进度巡检</option>
                                <option value="step-runner">拆步执行</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>执行间隔 (分)</label>
                            <input type="number" id="ap-interval" min="1">
                        </div>
                        <div class="field">
                            <label>最大线程数</label>
                            <input type="number" id="ap-max-threads" min="1">
                        </div>
                    </div>
                    <div class="field mt-10">
                        <label>完成标识 (逗号分隔)</label>
                        <input type="text" id="ap-patterns" placeholder="已完成, done...">
                    </div>
                    <div class="ap-footer mt-10">
                        <button id="save-ap-btn" class="primary-btn small">保存设置</button>
                    </div>
                </div>
            </header>

            <section id="chat-body" class="chat-body">
                <div id="chat-welcome" class="welcome-msg">请从左侧选择一个线程开始对话</div>
                <div id="messages-container"></div>
            </section>

            <footer class="chat-footer">
                <div class="quick-replies">
                    <button class="quick-btn" data-msg="继续">继续</button>
                    <button class="quick-btn" data-msg="进度？">进度？</button>
                    <button class="quick-btn" data-msg="不对">不对</button>
                    <button id="refresh-btn" class="quick-btn gray">↺ 刷新</button>
                </div>
                <div class="input-area">
                    <textarea id="chat-input" placeholder="输入消息..." rows="1"></textarea>
                    <button id="send-btn" class="primary-btn">发送</button>
                </div>
            </footer>
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="./thread-chat.js?v=20260427b"></script>
</body>
</html>
