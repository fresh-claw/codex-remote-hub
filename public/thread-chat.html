<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Codex Remote Hub</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=20260427a">
    <link rel="stylesheet" href="./thread-chat.css?v=20260427a">
  </head>
  <body>
    <div id="loginGate" class="login-gate">
      <form id="loginForm" class="login-card" autocomplete="on">
        <p class="login-kicker">Codex Remote Hub</p>
        <h1>远程任务台</h1>
        <p class="login-copy">登录后可查看线程进展，并向对应线程发送推进消息。</p>
        <label class="login-field">
          <span>访问密码</span>
          <input id="passwordInput" type="password" placeholder="输入强密码" autocomplete="current-password" required>
        </label>
        <button id="loginButton" class="primary-button" type="submit">进入</button>
        <p id="loginError" class="login-error" aria-live="polite"></p>
      </form>
    </div>

    <div id="appShell" class="app-shell hidden">
      <div id="sidebarBackdrop" class="sidebar-backdrop hidden"></div>
      <aside class="sidebar">
        <div class="sidebar-head">
          <div>
            <p class="eyebrow">本机任务</p>
            <h1>Codex Remote Hub</h1>
          </div>
          <div class="sidebar-head-actions">
            <button id="sidebarCloseButton" class="ghost-button compact mobile-only" type="button">收起</button>
            <button id="logoutButton" class="ghost-button compact" type="button">锁定</button>
          </div>
        </div>

        <div class="sidebar-toolbar">
          <div class="security-pill">强密码保护</div>
          <button id="refreshButton" class="ghost-button" type="button">刷新</button>
        </div>

        <div class="sidebar-meta">
          <span id="syncBadge">同步于 --</span>
          <span id="threadCountLabel">0 个线程</span>
        </div>

        <nav id="threadList" class="thread-list" aria-label="Threads"></nav>
      </aside>

      <main class="chat-shell">
        <header class="chat-head">
          <div class="chat-head-main">
            <span id="threadStateLabel" class="thread-state-pill">等待选择线程</span>
            <h2 id="threadTitle">选择左侧线程</h2>
          </div>
          <div class="chat-meta">
            <button id="mobileThreadButton" class="ghost-button compact mobile-only" type="button">线程</button>
            <button id="autopilotToggleButton" class="ghost-button compact" type="button">托管</button>
            <span id="threadActiveAt">最后活动 --</span>
            <span id="threadCanSend" class="send-badge idle">可发送</span>
          </div>
        </header>

        <section id="autopilotPanel" class="autopilot-panel hidden" aria-label="托管编排">
          <div class="autopilot-card">
            <div class="autopilot-copy">
              <p class="eyebrow">夜间托管</p>
              <h3>让 Codex 自己往下跑</h3>
              <p id="autopilotSummary">选择模式后，可开启托管或立即执行一次。</p>
            </div>
            <div class="autopilot-status-card">
              <span id="autopilotStateText">关闭</span>
              <strong id="autopilotModeText">夜间继续</strong>
            </div>
          </div>

          <div id="autopilotPresetList" class="autopilot-presets" aria-label="托管模式">
            <button class="preset-chip active" data-autopilot-preset="night" type="button">
              <strong>夜间继续</strong>
              <span>适合睡前长任务</span>
            </button>
            <button class="preset-chip" data-autopilot-preset="progress" type="button">
              <strong>进度巡检</strong>
              <span>先问卡点再推进</span>
            </button>
            <button class="preset-chip" data-autopilot-preset="step" type="button">
              <strong>拆步执行</strong>
              <span>要求拆小步继续</span>
            </button>
          </div>

          <div class="autopilot-actions">
            <button id="autopilotPowerButton" class="primary-button" type="button">开启托管</button>
            <button id="autopilotRunButton" class="ghost-button" type="button">执行一次</button>
            <button id="autopilotAdvancedButton" class="ghost-button" type="button">高级设置</button>
            <span id="autopilotStatus" class="composer-tip">未同步</span>
          </div>

          <div id="autopilotAdvancedFields" class="autopilot-advanced hidden">
            <div class="autopilot-grid">
              <label class="mini-field">
                <span>无变化后发送</span>
                <input id="autopilotIntervalInput" type="number" min="1" max="240" value="15">
              </label>
              <label class="mini-field">
                <span>同线程间隔</span>
                <input id="autopilotCooldownInput" type="number" min="1" max="240" value="15">
              </label>
              <label class="mini-field">
                <span>每轮线程数</span>
                <input id="autopilotMaxThreadsInput" type="number" min="1" max="20" value="2">
              </label>
            </div>

            <label class="autopilot-textarea">
              <span>话术编排，每行一条，按顺序轮换</span>
              <textarea id="autopilotStepsInput" rows="4">继续
进度？
请拆下一步并继续执行，完成后说明结果。</textarea>
            </label>

            <label class="autopilot-textarea">
              <span>完成识别词，命中后停止托管</span>
              <textarea id="autopilotDoneInput" rows="2">已完成
完成了
done
finished</textarea>
            </label>
          </div>
        </section>

        <section id="messageList" class="message-list empty">
          选择一个线程后，这里会显示对话内容。
        </section>

        <footer class="composer">
          <div class="quick-row">
            <button class="quick-chip" data-quick-message="继续" type="button">继续</button>
            <button class="quick-chip" data-quick-message="进度？" type="button">进度？</button>
            <button class="quick-chip" data-quick-message="不对" type="button">不对</button>
          </div>

          <label class="composer-field">
            <textarea id="composerInput" rows="3" placeholder="直接向当前线程发送消息"></textarea>
          </label>

          <div class="composer-actions">
            <span id="composerStatus" class="composer-tip">按 ⌘/Ctrl + Enter 发送</span>
            <button id="sendButton" class="primary-button" type="button">发送</button>
          </div>
        </footer>
      </main>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <script src="./thread-chat.js?v=20260427a" type="module"></script>
  </body>
</html>
